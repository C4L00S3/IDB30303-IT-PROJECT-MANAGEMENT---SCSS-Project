{% extends "base.html" %}

{% block title %}Login - SSCSS{% endblock %}

{% block content %}
<div class="login-container" id="role-selection-step">
    <div class="login-header">
        <h1>Welcome to SSCSS</h1>
        <p class="text-muted">Select your role to continue</p>
    </div>

    <div class="dashboard-grid" style="gap: 1rem; grid-template-columns: 1fr;">
        <button onclick="showLoginForm('Student')" class="card" style="margin-bottom: 0; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; text-align: left;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="background-color: #e0e7ff; color: #4f46e5; padding: 1rem; border-radius: 50%;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                </div>
                <div>
                    <h3 style="font-size: 1.125rem; color: #0f172a;">Student</h3>
                    <p style="font-size: 0.875rem; color: #64748b; margin-top: 0.25rem;">Access classroom bookings and report issues.</p>
                </div>
            </div>
        </button>

        <button onclick="showLoginForm('Lecturer')" class="card" style="margin-bottom: 0; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; text-align: left;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="background-color: #fef3c7; color: #d97706; padding: 1rem; border-radius: 50%;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                </div>
                <div>
                    <h3 style="font-size: 1.125rem; color: #0f172a;">Lecturer</h3>
                    <p style="font-size: 0.875rem; color: #64748b; margin-top: 0.25rem;">Book laboratories and manage your reservations.</p>
                </div>
            </div>
        </button>

        <button onclick="showLoginForm('Administrator')" class="card" style="margin-bottom: 0; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; text-align: left;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="background-color: #fee2e2; color: #dc2626; padding: 1rem; border-radius: 50%;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <div>
                    <h3 style="font-size: 1.125rem; color: #0f172a;">Administrator</h3>
                    <p style="font-size: 0.875rem; color: #64748b; margin-top: 0.25rem;">System oversight and maintenance tracking.</p>
                </div>
            </div>
        </button>
    </div>
</div>

<div class="login-container" id="login-form-step" style="display: none;">
    <div class="login-header">
        <h1 id="login-title">Sign In</h1>
        <p class="text-muted">Enter your credentials to continue</p>
    </div>

    <div class="card">
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
                <button type="button" onclick="showRoleSelection()" style="background: none; border: none; color: #4f46e5; cursor: pointer; font-size: 0.875rem; font-weight: 600;">&larr; Change Role</button>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
    </div>
</div>

<script>
    function showLoginForm(role) {
        document.getElementById('role-selection-step').style.display = 'none';
        document.getElementById('login-form-step').style.display = 'block';
        
        document.getElementById('login-title').innerText = role + " Login";
        document.getElementById('email').focus();
    }

    function showRoleSelection() {
        document.getElementById('login-form-step').style.display = 'none';
        document.getElementById('role-selection-step').style.display = 'block';
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
    }
</script>
{% endblock %}
